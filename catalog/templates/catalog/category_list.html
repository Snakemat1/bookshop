{% extends "catalog/base.html" %}

{% block title %}Категории{% endblock %}

{% block content %}
<h1 class="mb-4">Категории</h1>
<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for category in categories %}
    <div class="col">
        <div class="card h-100">
            <div class="card-body">
                <h5 class="card-title">{{ category.name }}</h5>
                <p class="card-text text-muted">{{ category.description|truncatewords:20 }}</p>
            </div>
            <div class="card-footer">
                <a href="{{ category.get_absolute_url }}" class="btn btn-outline-secondary btn-sm w-100">Смотреть книги</a>
            </div>
        </div>
    </div>
    {% empty %}
        <p class="text-muted">Категорий пока нет.</p>
    {% endfor %}
</div>
{% endblock %}
