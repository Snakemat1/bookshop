<!DOCTYPE html>
<html lang="ru" style="height: 100%;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Книжный магазин{% endblock %}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="min-height: 100%; display: flex; flex-direction: column;">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'catalog:book_list' %}">📚 Bookshop</a>
            <div class="navbar-nav ms-auto align-items-center">
                <a class="nav-link" href="{% url 'catalog:book_list' %}">Книги</a>
                <a class="nav-link" href="{% url 'catalog:author_list' %}">Авторы</a>
                <a class="nav-link" href="{% url 'catalog:category_list' %}">Категории</a>

                {% if request.user.is_authenticated %}
                    <a class="nav-link" href="{% url "users:profile" %}">
                        👤 {{ request.user.username }}
                    </a>
                    <a href="{% url 'cart:detail' %}" class="btn btn-outline-secondary">
                        🛒 Корзина {% if cart %}({{ cart|length }}){% endif %}
                    </a>
                    <form method="post" action="{% url "users:logout" %}" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm ms-2">
                            Выйти
                        </button>

                    </form>
                {% else %}
                    <a class="btn btn-outline-light btn-sm ms-3" href="{% url "users:login" %}">Войти</a>
                    <a class="btn btn-light btn-sm ms-2" href="{% url "users:register" %}">Регистрация</a>
                {% endif %}

            </div>
        </div>
    </nav>

    <main class="container my-4" style="flex: 1;">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-dark text-light py-3 mt-5">
        <div class="container text-center">
            <small>Bookshop &copy; 2024</small>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
