<!DOCTYPE html>
<html lang="ru" style="height: 100%;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Книжный магазин{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="min-height: 100%; display: flex; flex-direction: column;">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'catalog:book_list' %}">📚 Bookshop</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'catalog:book_list' %}">Книги</a>
                <a class="nav-link" href="{% url 'catalog:author_list' %}">Авторы</a>
                <a class="nav-link" href="{% url 'catalog:category_list' %}">Категории</a>
            </div>
        </div>
    </nav>

    <main class="container my-4" style="flex: 1;">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-dark text-light py-3 mt-5">
        <div class="container text-center">
            <small>Bookshop &copy; 2024</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
