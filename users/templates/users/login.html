{% extends "catalog/base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-4 p-md-5">

        <h2 class="fw-bold mb-1">Добро пожаловать</h2>
        <p class="text-muted mb-4">Нет аккаунта?
          <a href="{% url "users:register" %}" class="text-decoration-none">Зарегистрироваться</a>
        </p>

        <form method="post">
        {% csrf_token %}
            

          {% for field in form %}
          <div class="mb-3">
            <label for="{{ field.id_for_label }}" class="form-label fw-medium">
              {{ field.label }}
            </label>
            <input
              type="{{ field.field.widget.input_type }}"
              name="{{ field.html_name }}"
              id="{{ field.id_for_label }}"
              class="form-control rounded-3 {% if field.errors %}is-invalid{% endif %}"
              {% if field.value %}value="{{ field.value }}"{% endif %}
            >
            {% for error in field.errors %}
              <div class="invalid-feedback">{{ error }}</div>
            {% endfor %}
          </div>
          {% endfor %}

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-dark btn-lg rounded-3">Войти</button>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
{% endblock %}
